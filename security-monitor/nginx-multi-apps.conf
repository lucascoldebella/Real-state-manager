# Rate limiting zones
limit_req_zone $binary_remote_addr zone=global:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=3r/m;
limit_conn_zone $binary_remote_addr zone=connlimit:10m;

# --- COLDNB (Port 80) ---
server {
    listen 80;
    server_name _;

    # Connection limits
    limit_conn connlimit 20;

    # Scanner/bot blocking
    if ($http_user_agent ~* (zgrab|masscan|nmap|sqlmap|nikto|dirbuster|gobuster|nuclei|httpx|whatweb)) {
        return 444;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API proxy to coldnb C backend
    location /api/ {
        limit_req zone=global burst=20 nodelay;
        
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        
        # CORS handled by backend
    }
    
    # Auth rate limiting (stricter)
    location /api/admin/login {
        limit_req zone=auth burst=2 nodelay;
        
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static uploads
    location /uploads/ {
        alias /var/www/coldnb/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        
        # Only allow image files
        location ~* \.(jpg|jpeg|png|gif|webp|svg|ico)$ {
            try_files $uri =404;
        }
        
        # Block everything else
        return 403;
    }

    # Block RSC exploit attempts (CVE-2025-66478)
    # Block POST to root with Go-http-client (common exploit scanner)
    if ($request_method = POST) {
        set $block_post "post";
    }
    if ($uri = /) {
        set $block_post "${block_post}_root";
    }
    if ($http_user_agent ~* "Go-http-client") {
        set $block_post "${block_post}_bot";
    }
    if ($block_post = "post_root_bot") {
        return 403;
    }

    # Frontend proxy to Next.js
    location / {
        # Block Next-Action header (RSC exploit vector)
        if ($http_next_action) {
            return 403;
        }
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    
    # Next.js static assets
    location /_next/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    client_max_body_size 10M;
}

# --- REAL ESTATE MANAGER (Port 8081) ---
server {
    listen 8081;
    server_name _;

    # Connection limits
    limit_conn connlimit 20;

    # Scanner/bot blocking
    if ($http_user_agent ~* (zgrab|masscan|nmap|sqlmap|nikto|dirbuster|gobuster|nuclei|httpx|whatweb)) {
        return 444;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Security Monitor API proxy (must be before generic /api/)
    location /api/monitor/ {
        proxy_pass http://127.0.0.1:9090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API proxy to realstate C backend
    location /api/ {
        limit_req zone=global burst=20 nodelay;
        
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # Auth rate limiting (stricter)
    location /api/auth/login {
        limit_req zone=auth burst=2 nodelay;
        
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend proxy to Next.js
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Next.js static assets
    location /_next/ {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    client_max_body_size 12M;
}
