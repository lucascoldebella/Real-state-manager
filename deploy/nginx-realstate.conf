# Rate limiting zones
limit_req_zone $binary_remote_addr zone=realstate_global:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=realstate_auth:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=realstate_conn:10m;

# Bot/scanner user-agent blocklist
map $http_user_agent $realstate_bad_bot {
    default 0;
    ~*(?:nmap|nikto|wikto|sf|sqlmap|bsqlbf|w3af|acunetix|havij|appscan) 1;
    ~*(?:Headless|PhantomJS|Selenium|masscan|zgrab|gobuster|dirbuster) 1;
    ~*(?:ltx71|MJ12bot|AhrefsBot|SemrushBot|DotBot|BLEXBot) 1;
}

server {
    listen 80;
    server_name imoveis.oliveiracosta.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name imoveis.oliveiracosta.com;

    # TLS — update paths to actual certificates
    ssl_certificate     /etc/letsencrypt/live/imoveis.oliveiracosta.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/imoveis.oliveiracosta.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    server_tokens off;

    # Connection limits
    limit_conn realstate_conn 20;

    # Block bad bots
    if ($realstate_bad_bot) {
        return 403;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Auth endpoint — stricter rate limit
    location /api/auth/login {
        limit_req zone=realstate_auth burst=3 nodelay;
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other API routes
    location / {
        limit_req zone=realstate_global burst=20 nodelay;
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Limit request body size
        client_max_body_size 12M;
    }
}
